services:
  postgres:
    image: postgres:16-alpine
    container_name: tumi_postgres
    environment:
      POSTGRES_DB: tumi
      POSTGRES_USER: tumi
      POSTGRES_PASSWORD: tumi_pwd
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tumi"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tumi_redis
    ports:
      - "6378:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: tumi_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - app-net

  backend:
    build: ./backend
    container_name: tumi_backend
    network_mode: host
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_URL: http://localhost:8001
      DB_CONNECTION: pgsql
      DB_HOST: localhost
      DB_PORT: 5433
      DB_DATABASE: tumi
      DB_USERNAME: tumi
      DB_PASSWORD: tumi_pwd
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: localhost
      REDIS_PORT: 6378
      BROADCAST_DRIVER: pusher
      PUSHER_APP_ID: local
      PUSHER_APP_KEY: local
      PUSHER_APP_SECRET: local
      PUSHER_HOST: localhost
      PUSHER_PORT: 6001
      PUSHER_SCHEME: http
      SESSION_DOMAIN: .localhost
      SESSION_SAME_SITE: lax
      SESSION_SECURE_COOKIE: false
      SANCTUM_STATEFUL_DOMAINS: localhost:4200,127.0.0.1:4200
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_FROM_ADDRESS: noreply@tumi-configurator.com
      MAIL_FROM_NAME: Tumi Solar Configurator
      FRONTEND_URL: http://localhost:4200
      PASSWORD_RESET_EXPIRE: 60
      SERVER_PORT: 8001
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    ports:
      - "8000:8000"
    networks:
      - app-net

  soketi:
    image: quay.io/soketi/soketi:1.4-16-alpine
    container_name: tumi_soketi
    environment:
      SOKETI_DEBUG: 1
      SOKETI_DEFAULT_APP_ID: local
      SOKETI_DEFAULT_APP_KEY: local
      SOKETI_DEFAULT_APP_SECRET: local
    ports:
      - "6001:6001"
    networks:
      - app-net

  frontend:
    build: ./frontend
    container_name: tumi_frontend
    environment:
      API_BASE_URL: http://localhost:8001/api
      WS_HOST: localhost
      WS_PORT: 6001
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.angular
    depends_on:
      - backend
      - soketi
    ports:
      - "4200:4200"
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  pgdata:
    driver: local
  redis_data:
    driver: local
