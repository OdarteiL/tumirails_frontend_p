name: CI Pipeline

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

env:
  PHP_VERSION: '8.3'
  NODE_VERSION: '20'

jobs:
  backend-lint:
    name: Backend Code Style (Laravel Pint)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_pgsql, mbstring, exif, pcntl, bcmath, gd, zip, intl, redis, pcov
          coverage: pcov

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run Laravel Pint
        working-directory: backend
        run: ./vendor/bin/pint --test

  backend-test:
    name: Backend Tests (PHPUnit)
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tumi_test
          POSTGRES_USER: tumi
          POSTGRES_PASSWORD: tumi_pwd
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_pgsql, mbstring, exif, pcntl, bcmath, gd, zip, intl, redis, pcov
          coverage: pcov

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Copy environment file
        working-directory: backend
        run: cp .env.example .env

      - name: Generate application key
        working-directory: backend
        run: php artisan key:generate

      - name: Set testing environment
        working-directory: backend
        run: |
          sed -i 's/DB_CONNECTION=pgsql/DB_CONNECTION=pgsql/' .env
          sed -i 's/DB_HOST=postgres/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_PORT=5432/DB_PORT=5432/' .env
          sed -i 's/DB_DATABASE=tumi/DB_DATABASE=tumi_test/' .env
          sed -i 's/DB_USERNAME=tumi/DB_USERNAME=tumi/' .env
          sed -i 's/DB_PASSWORD=tumi_pwd/DB_PASSWORD=tumi_pwd/' .env
          sed -i 's/REDIS_HOST=redis/REDIS_HOST=127.0.0.1/' .env

      - name: Run database migrations
        working-directory: backend
        run: php artisan migrate --force

      - name: Run PHPUnit tests
        working-directory: backend
        run: php artisan test --coverage --min=80

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: backend/coverage/

  backend-build:
    name: Backend Docker Build & Migration Check
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tumi
          POSTGRES_USER: tumi
          POSTGRES_PASSWORD: tumi_pwd
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: false
          tags: tumi-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Create Docker network
        run: docker network create tumi-test-network

      - name: Connect postgres to network
        run: docker network connect tumi-test-network postgres

      - name: Test migrations with production image
        run: |
          docker run --rm --network tumi-test-network \
            -e APP_KEY=base64:$(openssl rand -base64 32) \
            -e DB_CONNECTION=pgsql \
            -e DB_HOST=postgres \
            -e DB_PORT=5432 \
            -e DB_DATABASE=tumi \
            -e DB_USERNAME=tumi \
            -e DB_PASSWORD=tumi_pwd \
            tumi-backend:test \
            php artisan migrate --force --no-interaction

      - name: Verify database connection
        run: |
          docker run --rm --network tumi-test-network \
            -e APP_KEY=base64:$(openssl rand -base64 32) \
            -e DB_CONNECTION=pgsql \
            -e DB_HOST=postgres \
            -e DB_PORT=5432 \
            -e DB_DATABASE=tumi \
            -e DB_USERNAME=tumi \
            -e DB_PASSWORD=tumi_pwd \
            tumi-backend:test \
            php artisan db:show

  frontend-lint:
    name: Frontend Code Style (ESLint)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

      - name: Build production Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: false
          tags: tumi-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-check:
    name: Integration Verification
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, backend-build, frontend-lint, frontend-build]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify all checks passed
        run: echo "✅ All CI checks passed successfully!"
