<div class="admin-container">
    <!-- Sidebar Overlay (Mobile) -->
    <div *ngIf="isSidebarOpen()" (click)="toggleSidebar()" (keydown.enter)="toggleSidebar()"
        (keydown.space)="toggleSidebar()" tabindex="0" role="button" aria-label="Close sidebar"
        class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-40 lg:hidden text-transparent">Close</div>

    <!-- Sidebar -->
    <aside class="sidebar" [class.mobile-open]="isSidebarOpen()">
        <div class="sidebar-header flex items-center justify-center px-6 py-4">
            <a routerLink="/" class="flex items-center hover:opacity-80 transition-opacity">
                <img src="/assets/tumi_logo.png" alt="Tumi Solar" class="h-8 w-auto">
            </a>
        </div>

        <nav class="sidebar-nav mt-8">
            <!-- DYNAMIC SIDEBAR CONTENT SLOT -->
            <ng-content select="[sidebarMenu]"></ng-content>
        </nav>

        <div class="sidebar-footer">
            <a href="#" (click)="logout($event)"
                class="nav-item group text-red-200/70 hover:text-red-100 hover:bg-red-500/10">
                <lucide-icon [img]="LogOut" [size]="20"></lucide-icon>
                <span>Logout</span>
            </a>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
        <!-- Headerbar -->
        <header class="headerbar">
            <div class="header-left">
                <button class="p-2 -ml-2 text-slate-500 lg:hidden hover:bg-slate-100 rounded-lg transition-colors"
                    (click)="toggleSidebar()">
                    <lucide-icon [img]="Menu" size="24"></lucide-icon>
                </button>

                <h2 class="text-xl font-black text-slate-900">{{ pageTitle() }}</h2>
            </div>

            <div class="header-right">
                <div class="user-profile group">
                    <div class="user-avatar bg-gradient-to-br from-primary to-indigo-600">
                        {{ userInitials() }}
                    </div>
                    <div class="user-info hidden md:flex">
                        <span class="user-name">{{ userName() }}</span>
                        <span class="user-role">{{ userRole() }}</span>
                    </div>
                    <lucide-icon [img]="ChevronDown" [size]="16"
                        class="text-slate-300 group-hover:text-primary transition-colors ml-1"></lucide-icon>
                </div>
            </div>
        </header>

        <!-- Page Content Slot -->
        <section class="page-content bg-[#f8fafc]">
            <div class="max-w-[1600px] mx-auto min-h-[calc(100vh-160px)]">
                <!-- DYNAMIC PAGE CONTENT SLOT -->
                <ng-content></ng-content>
            </div>
        </section>


        <!-- Footer -->
        <footer class="admin-footer">
            <div class="text-slate-400">
                &copy; 2024 <span class="font-bold text-primary">TUMI</span> Configurator.
            </div>
            <div class="flex gap-6 font-medium">
                <a href="#" class="hover:text-primary transition-colors">Support</a>
                <a href="#" class="hover:text-primary transition-colors">Documentation</a>
            </div>
        </footer>
    </main>
</div>
