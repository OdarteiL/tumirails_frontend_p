<div class="min-h-screen bg-white font-sans text-slate-800 py-20 px-4 sm:px-6 lg:px-8">

    <!-- Contact Section -->
    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-16 mb-24">

        <!-- Left: Image -->
        <div class="order-2 lg:order-1 relative h-[500px] lg:h-auto rounded-3xl overflow-hidden shadow-2xl group">
            <img src="assets/contact-location.png" alt="Our Location in Ghana"
                class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
            <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
            <div class="absolute bottom-8 left-8 right-8">
                <h3 class="text-3xl font-bold text-white mb-2 drop-shadow-md">Our Location in Ghana</h3>
                <p class="text-slate-200 text-lg drop-shadow-sm">Tumirails HQ, Green Energy District, Accra</p>
            </div>
        </div>

        <!-- Right: Form & Info -->
        <div class="order-1 lg:order-2 bg-white rounded-3xl p-8 lg:p-12 shadow-xl border border-slate-100">
            <div class="mb-10">
                <h2 class="text-3xl font-bold text-slate-900 mb-6">Get in Touch</h2>

                <div class="space-y-4">
                    <div class="flex items-start gap-4">
                        <div
                            class="mt-1 w-10 h-10 rounded-full bg-secondary flex items-center justify-center text-primary flex-shrink-0">
                            <lucide-icon [img]="MapPin" class="w-5 h-5"></lucide-icon>
                        </div>
                        <div>
                            <p class="text-slate-900 font-medium">Tumirails HQ, 123 Solar Street, Green Energy District,
                            </p>
                            <p class="text-slate-600">Accra, Ghana</p>
                        </div>
                    </div>

                    <div class="flex items-center gap-4">
                        <div
                            class="w-10 h-10 rounded-full bg-secondary flex items-center justify-center text-primary flex-shrink-0">
                            <lucide-icon [img]="Phone" class="w-5 h-5"></lucide-icon>
                        </div>
                        <p class="text-slate-600">
                            <span class="font-medium text-slate-900">+233 55 123 4567</span> (Sales), <span
                                class="font-medium text-slate-900">+233 20 987 6543</span> (Support)
                        </p>
                    </div>

                    <div class="flex items-center gap-4">
                        <div
                            class="w-10 h-10 rounded-full bg-secondary flex items-center justify-center text-primary flex-shrink-0">
                            <lucide-icon [img]="Mail" class="w-5 h-5"></lucide-icon>
                        </div>
                        <p class="text-slate-600 font-medium">contact@tumirails.com</p>
                    </div>
                </div>
            </div>

            <h3 class="text-xl font-bold text-slate-900 mb-6 border-t border-slate-100 pt-8">Send us a Message</h3>

            <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Name</label>
                    <input type="text" formControlName="name" placeholder="Your Full Name"
                        class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-[#0E6C8B] focus:border-transparent outline-none transition-all">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Email</label>
                    <input type="email" formControlName="email" placeholder="your.email@example.com"
                        class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-[#0E6C8B] focus:border-transparent outline-none transition-all">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Subject</label>
                    <input type="text" formControlName="subject" placeholder="Inquiry Subject"
                        class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-[#0E6C8B] focus:border-transparent outline-none transition-all">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Your Message</label>
                    <textarea formControlName="message" rows="4" placeholder="How can we help you?"
                        class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-[#0E6C8B] focus:border-transparent outline-none transition-all"></textarea>
                </div>

                <button type="submit" [disabled]="!contactForm.valid"
                    class="w-full bg-primary hover:bg-primary disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-bold py-3 px-6 rounded-lg text-lg transition-all duration-300 shadow-md">
                    Send Message
                </button>
            </form>
        </div>

    </div>

    <!-- FAQ Section -->
    <div class="max-w-4xl mx-auto">
        <h2 class="text-3xl md:text-4xl font-bold text-center text-slate-900 mb-12">Frequently Asked Questions</h2>

        <div class="space-y-4">
            <div *ngFor="let faq of faqs; let i = index"
                class="bg-white rounded-xl border border-slate-200 overflow-hidden transition-all duration-300"
                [class.shadow-md]="openFaqIndex === i">
                <button
                    class="w-full flex items-center justify-between p-6 text-left focus:outline-none hover:bg-slate-50 transition-colors"
                    (click)="toggleFaq(i)">
                    <span class="text-lg font-semibold text-slate-800 pr-8">{{ faq.question }}</span>
                    <div class="flex-shrink-0 text-slate-400">
                        <lucide-icon *ngIf="openFaqIndex !== i" [img]="ChevronDown" class="w-5 h-5"></lucide-icon>
                        <lucide-icon *ngIf="openFaqIndex === i" [img]="ChevronUp"
                            class="w-5 h-5 text-[#0E6C8B]"></lucide-icon>
                    </div>
                </button>
                <div class="px-6 pb-6 text-slate-600 leading-relaxed border-t border-slate-100 pt-4 bg-slate-50/50"
                    *ngIf="openFaqIndex === i">
                    {{ faq.answer }}
                </div>
            </div>
        </div>

    </div>
</div>
