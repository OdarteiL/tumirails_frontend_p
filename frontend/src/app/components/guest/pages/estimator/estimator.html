<div class="min-h-screen bg-slate-50 font-sans text-slate-800 py-20 px-4 sm:px-6 lg:px-8">
    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8">

        <!-- Left Card: Energy Profile -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 md:p-10">
            <h2 class="text-2xl font-bold text-slate-900 mb-8">Your Energy Profile</h2>

            <!-- Usage Slider -->
            <div class="mb-10">
                <label for="monthly-usage" class="block text-sm font-semibold text-slate-700 mb-4 flex justify-between">
                    Monthly Electricity Usage (kWh)
                    <span class="text-[#0E6C8B] font-bold">{{ monthlyUsage() }} kWh</span>
                </label>
                <input id="monthly-usage" type="range" min="100" max="2000" step="50" [value]="monthlyUsage()"
                    (input)="onUsageChange($event)"
                    class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-[#0E6C8B]">
            </div>

            <!-- Bill Input -->
            <div class="mb-10">
                <label for="monthly-bill" class="block text-sm font-semibold text-slate-700 mb-3">Average Monthly
                    Electricity Bill
                    (GH₵)</label>
                <div class="relative">
                    <input id="monthly-bill" type="number" [ngModel]="monthlyBill()"
                        (ngModelChange)="monthlyBill.set($event)"
                        class="block w-full pl-4 pr-4 py-3 border border-slate-300 rounded-lg focus:ring-[#0E6C8B] focus:border-[#0E6C8B] text-slate-900 placeholder-slate-400 transition-colors"
                        placeholder="200">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none hidden">
                        <!-- Optional Prefix styling if needed, currently inside input placeholder/value roughly -->
                    </div>
                </div>
            </div>

            <!-- Appliances -->
            <div>
                <div class="block text-sm font-semibold text-slate-700 mb-4">Common Appliance Usage</div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div *ngFor="let app of appliances()" class="flex items-start">
                        <div class="flex items-center h-5">
                            <input type="checkbox" [checked]="app.checked" (change)="app.checked = !app.checked"
                                class="w-5 h-5 border-slate-300 rounded text-[#0E6C8B] focus:ring-[#0E6C8B] cursor-pointer">
                        </div>
                        <div class="ml-3 text-sm">
                            <span class="text-slate-600 cursor-pointer select-none">
                                {{ app.name }} <span class="text-slate-400 text-xs ml-1">({{ app.power }})</span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Card: Solar Potential -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 md:p-10 flex flex-col justify-between">
            <div>
                <h2 class="text-2xl font-bold text-slate-900 mb-12">Your Solar Potential</h2>

                <div class="space-y-10">

                    <!-- Monthly Savings -->
                    <div class="flex items-start gap-4">
                        <div class="flex-shrink-0 mt-1">
                            <lucide-icon [img]="DollarSign" class="w-8 h-8 text-[#0E6C8B]"
                                strokeWidth="2.5"></lucide-icon>
                        </div>
                        <div>
                            <p class="text-sm text-slate-500 font-medium mb-1">Estimated Monthly Savings</p>
                            <p class="text-4xl font-bold text-[#0E6C8B]">
                                GH₵ {{ estimatedSavings() }}
                            </p>
                        </div>
                    </div>

                    <!-- Solar Output -->
                    <div class="flex items-start gap-4">
                        <div class="flex-shrink-0 mt-1">
                            <lucide-icon [img]="Zap" class="w-8 h-8 text-slate-700" strokeWidth="2.5"></lucide-icon>
                        </div>
                        <div>
                            <p class="text-sm text-slate-500 font-medium mb-1">Estimated Solar Output</p>
                            <p class="text-4xl font-bold text-slate-900">
                                {{ estimatedOutput() }} <span
                                    class="text-2xl font-medium text-slate-500">kWh/month</span>
                            </p>
                        </div>
                    </div>

                    <!-- Installation Cost -->
                    <div class="flex items-start gap-4">
                        <div class="flex-shrink-0 mt-1">
                            <lucide-icon [img]="Sun" class="w-8 h-8 text-slate-500" strokeWidth="2.5"></lucide-icon>
                        </div>
                        <div>
                            <p class="text-sm text-slate-500 font-medium mb-1">Estimated Installation Cost</p>
                            <p class="text-4xl font-bold text-slate-900">
                                GH₵ {{ estimatedCost() }}
                            </p>
                        </div>
                    </div>

                </div>
            </div>

            <div class="mt-12">
                <button
                    class="w-full bg-[#0E6C8B] hover:bg-[#094d63] text-white font-bold py-4 px-6 rounded-lg text-lg transition-all duration-300 shadow-md hover:shadow-lg">
                    Get Certified Installer Quotes
                </button>
            </div>
        </div>

    </div>
</div>
