<nav class="bg-white border-b border-gray-200 shadow-md fixed top-0 left-0 right-0 z-50">
    <div class="container mx-auto px-6 h-20 flex justify-between items-center">

        <!-- Logo -->
        <a routerLink="/" class="flex items-center space-x-2 group">
            <img src="assets/tumi_logo.png" alt="Tumirails Logo" class="h-16 lg:h-20">
        </a>

        <div class="flex items-center gap-8">
            <!-- Desktop Menu -->
            <div class="hidden lg:flex items-center space-x-5">
                <a routerLink="/" routerLinkActive="text-primary underline font-semibold"
                    [routerLinkActiveOptions]="{exact: true}"
                    class="text-gray-600 hover:text-primary transition-colors font-medium text-[15px]">Home</a>
                <a routerLink="/about" routerLinkActive="text-primary underline font-semibold"
                    class="text-gray-600 hover:text-primary transition-colors font-medium text-[15px]">About
                    Us</a>
                <a routerLink="/how-it-works" routerLinkActive="text-primary underline font-semibold"
                    class="text-gray-600 hover:text-primary transition-colors font-medium text-[15px]">How It
                    Works</a>
                
                <!-- Services Dropdown -->
                <div class="relative" #servicesDropdown>
                    <button (click)="toggleServicesDropdown()" 
                        class="text-gray-600 hover:text-primary transition-colors font-medium text-[15px] flex items-center gap-1">
                        Services
                        <i-lucide [img]="ChevronDown" [size]="16"></i-lucide>
                    </button>
                    <div *ngIf="isServicesDropdownOpen" 
                        class="absolute top-full left-0 mt-2 w-48 bg-white border border-gray-200 rounded-lg shadow-lg py-2 z-50">
                        <a routerLink="/consumers" routerLinkActive="bg-gray-50 text-primary font-semibold"
                            (click)="isServicesDropdownOpen = false"
                            class="block px-4 py-2 text-gray-700 hover:bg-gray-50 hover:text-primary transition-colors">
                            Consumers
                        </a>
                        <a routerLink="/estimator" routerLinkActive="bg-gray-50 text-primary font-semibold"
                            (click)="isServicesDropdownOpen = false"
                            class="block px-4 py-2 text-gray-700 hover:bg-gray-50 hover:text-primary transition-colors">
                            Estimator
                        </a>
                        <a routerLink="/installers" routerLinkActive="bg-gray-50 text-primary font-semibold"
                            (click)="isServicesDropdownOpen = false"
                            class="block px-4 py-2 text-gray-700 hover:bg-gray-50 hover:text-primary transition-colors">
                            Installers & Vendors
                        </a>
                    </div>
                </div>

                <a routerLink="/contact" routerLinkActive="text-primary underline font-semibold"
                    class="text-gray-600 hover:text-primary transition-colors font-medium text-[15px]">Contact
                    & FAQ</a>
            </div>

            <!-- Auth Buttons -->
            <div class="hidden lg:flex items-center gap-4">
                <a routerLink="/login" class="btn btn-secondary btn-sm h-10">Sign In</a>
                <a routerLink="/register" class="btn btn-primary btn-sm h-10">Sign Up</a>
            </div>
        </div>

        <!-- Mobile Hamburger Button -->
        <div class="lg:hidden">
            <button class="text-gray-500 hover:text-primary focus:outline-none p-2" (click)="toggleMenu()"
                aria-label="Toggle menu">
                <i-lucide [img]="Menu" *ngIf="!isMenuOpen"></i-lucide>
                <i-lucide [img]="X" *ngIf="isMenuOpen"></i-lucide>
            </button>
        </div>

    </div>
</nav>

<!-- Mobile Menu Drawer -->
<div *ngIf="isMenuOpen" class="fixed inset-0 z-40 lg:hidden" (click)="toggleMenu()" (keydown.escape)="toggleMenu()"
    tabindex="0" role="dialog" aria-modal="true">
    <!-- Backdrop -->
    <div class="fixed inset-0 bg-black bg-opacity-50 transition-opacity"></div>

    <!-- Drawer -->
    <div class="fixed top-0 right-0 bottom-0 w-80 max-w-[85vw] bg-white shadow-2xl transform transition-transform"
        (click)="$event.stopPropagation()" (keydown)="$event.stopPropagation()" tabindex="-1">

        <!-- Drawer Header -->
        <div class="h-20 px-6 flex items-center justify-between border-b border-gray-200">
            <span class="text-xl font-bold text-primary font-secondary">Menu</span>
            <button (click)="toggleMenu()" class="text-gray-500 hover:text-primary p-2" aria-label="Close menu">
                <i-lucide [img]="X"></i-lucide>
            </button>
        </div>

        <!-- Drawer Content -->
        <div class="flex flex-col h-[calc(100%-5rem)] overflow-y-auto text-center justify-around">
            <!-- Navigation Links -->
            <div class="flex flex-col">
                <a routerLink="/" routerLinkActive="bg-opacity-10 underline text-primary font-semibold"
                    [routerLinkActiveOptions]="{exact: true}" (click)="toggleMenu()"
                    class="px-6 py-4 text-center text-gray-700 hover:bg-gray-50 hover:text-primary transition-colors">
                    Home
                </a>
                <a routerLink="/about" routerLinkActive="bg-opacity-10 underline text-primary font-semibold"
                    (click)="toggleMenu()"
                    class="px-6 py-4 text-gray-700 hover:bg-gray-50 hover:text-primary transition-colors">
                    About Us
                </a>
                <a routerLink="/how-it-works" routerLinkActive="bg-opacity-10 underline text-primary font-semibold"
                    (click)="toggleMenu()"
                    class="px-6 py-4 text-gray-700 hover:bg-gray-50 hover:text-primary transition-colors">
                    How It Works
                </a>
                <a routerLink="/consumers" routerLinkActive="bg-opacity-10 underline text-primary font-semibold"
                    (click)="toggleMenu()"
                    class="px-6 py-4 text-gray-700 hover:bg-gray-50 hover:text-primary transition-colors">
                    Consumers
                </a>
                <a routerLink="/estimator" routerLinkActive="bg-opacity-10 underline text-primary font-semibold"
                    (click)="toggleMenu()"
                    class="px-6 py-4 text-gray-700 hover:bg-gray-50 hover:text-primary transition-colors">
                    Estimator
                </a>
                <a routerLink="/installers" routerLinkActive="bg-opacity-10 underline text-primary font-semibold"
                    (click)="toggleMenu()"
                    class="px-6 py-4 text-gray-700 hover:bg-gray-50 hover:text-primary transition-colors">
                    Installers & Vendors
                </a>
                <a routerLink="/contact" routerLinkActive="bg-opacity-10 underline text-primary font-semibold"
                    (click)="toggleMenu()"
                    class="px-6 py-4 text-gray-700 hover:bg-gray-50 hover:text-primary transition-colors">
                    Contact & FAQ
                </a>
            </div>

            <!-- Auth Buttons -->
            <div class="mt-auto p-6 flex flex-col gap-3">
                <a routerLink="/login" (click)="toggleMenu()"
                    class="btn btn-secondary w-full h-12 flex items-center justify-center">
                    Sign In
                </a>
                <a routerLink="/register" (click)="toggleMenu()"
                    class="btn btn-primary w-full h-12 flex items-center justify-center">
                    Sign Up
                </a>
            </div>
        </div>
    </div>
</div>
