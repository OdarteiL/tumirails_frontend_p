<!-- Mobile Menu Drawer -->

            <span class="text-xl font-bold text-[var(--color-primary)] font-secondary">Menu</span>

        <div class="flex flex-col h-[calc(100%-5rem)] overflow-y-auto">
            <!-- Navigation Links -->
            <div class="flex flex-col py-4">
                <a routerLink="/"
                    routerLinkActive="bg-[var(--color-primary)] bg-opacity-10 text-[var(--color-primary)] font-semibold"

                    class="px-6 py-4 text-gray-700 hover:bg-gray-50 hover:text-[var(--color-primary)] transition-colors border-b border-gray-100">

                </a>
                <a routerLink="/about"
                    routerLinkActive="bg-[var(--color-primary)] bg-opacity-10 text-[var(--color-primary)] font-semibold"

                    About Us
                </a>
                <a routerLink="/how-it-works"
                    routerLinkActive="bg-[var(--color-primary)] bg-opacity-10 text-[var(--color-primary)] font-semibold"
                    (click)="toggleMenu()"
                    class="px-6 py-4 text-gray-700 hover:bg-gray-50 hover:text-[var(--color-primary)] transition-colors border-b border-gray-100">
                    How It Works
                </a>
                <a routerLink="/consumers"
                    routerLinkActive="bg-[var(--color-primary)] bg-opacity-10 text-[var(--color-primary)] font-semibold"
                    (click)="toggleMenu()"
                    class="px-6 py-4 text-gray-700 hover:bg-gray-50 hover:text-[var(--color-primary)] transition-colors border-b border-gray-100">
                    Consumers
                </a>
                <a routerLink="/estimator"
                    routerLinkActive="bg-[var(--color-primary)] bg-opacity-10 text-[var(--color-primary)] font-semibold"
                    (click)="toggleMenu()"
                    class="px-6 py-4 text-gray-700 hover:bg-gray-50 hover:text-[var(--color-primary)] transition-colors border-b border-gray-100">
                    Estimator
                </a>
                <a routerLink="/installers"
                    routerLinkActive="bg-[var(--color-primary)] bg-opacity-10 text-[var(--color-primary)] font-semibold"

                </a>
                <a routerLink="/contact"

                <a routerLink="/register" (click)="toggleMenu()"
