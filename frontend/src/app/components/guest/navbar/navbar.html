<nav class="navbar" [class.scrolled]="!isTransparent">
    <div class="navbar-inner">

        <!-- Left: Logo -->
        <a routerLink="/" class="navbar-logo">
            <img src="assets/tumi_new.png" alt="Tumirails Logo" class="navbar-logo-img">
        </a>

        <!-- Center: Nav Links -->
        <div class="navbar-links">
            <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">HOME</a>
            <a routerLink="/about" routerLinkActive="active" class="nav-link">ABOUT US</a>
            <a routerLink="/how-it-works" routerLinkActive="active" class="nav-link">HOW IT WORKS</a>
            <a routerLink="/estimator" routerLinkActive="active" class="nav-link">SOLAR FIT CHECK</a>
        </div>

        <!-- Right: Sign Up / Dashboard -->
        <div class="navbar-actions">
            <ng-container *ngIf="authService.isAuthenticated(); else guestActions">
                <a [routerLink]="dashboardLink" class="btn-signup">DASHBOARD</a>
            </ng-container>
            <ng-template #guestActions>
                <a routerLink="/login" class="btn-signup" style="margin-right: 0.5rem;">SIGN IN</a>
                <a routerLink="/register" class="btn-signup">SIGN UP</a>
            </ng-template>
        </div>

        <!-- Mobile Hamburger -->
        <button class="hamburger" (click)="toggleMenu()" aria-label="Toggle menu">
            <lucide-icon [img]="isMenuOpen ? X : Menu"></lucide-icon>
        </button>

    </div>
</nav>

<!-- Mobile Drawer -->
<div *ngIf="isMenuOpen" class="mobile-overlay" (click)="toggleMenu()" (keydown.escape)="toggleMenu()" tabindex="0" role="dialog" aria-modal="true">
    <div class="mobile-drawer" (click)="$event.stopPropagation()" (keydown)="$event.stopPropagation()" tabindex="-1">
        <div class="mobile-drawer-header">
            <span class="logo-text">TUMIRAILS</span>
            <button (click)="toggleMenu()" aria-label="Close menu">
                <lucide-icon [img]="X"></lucide-icon>
            </button>
        </div>
        <div class="mobile-links">
            <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="toggleMenu()" class="mobile-link">HOME</a>
            <a routerLink="/about" routerLinkActive="active" (click)="toggleMenu()" class="mobile-link">ABOUT US</a>
            <a routerLink="/how-it-works" routerLinkActive="active" (click)="toggleMenu()" class="mobile-link">HOW IT WORKS</a>
            <a routerLink="/estimator" routerLinkActive="active" (click)="toggleMenu()" class="mobile-link">SOLAR FIT CHECK</a>
        </div>
        <div class="mobile-actions">
            <ng-container *ngIf="authService.isAuthenticated(); else guestMobileActions">
                <a [routerLink]="dashboardLink" (click)="toggleMenu()" class="btn-signup w-full text-center">DASHBOARD</a>
            </ng-container>
            <ng-template #guestMobileActions>
                <a routerLink="/login" (click)="toggleMenu()" class="btn-signup w-full text-center">SIGN IN</a>
                <a routerLink="/register" (click)="toggleMenu()" class="btn-signup w-full text-center">SIGN UP</a>
            </ng-template>
        </div>
    </div>
</div>
