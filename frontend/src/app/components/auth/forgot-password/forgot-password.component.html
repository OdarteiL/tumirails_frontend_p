<div class="auth-page">
  <div class="auth-left">
    <div class="auth-inner">
      <a routerLink="/" class="auth-logo">
        <img src="assets/tumi_logo.png" alt="Tumirails">
      </a>

      <h1 class="auth-heading">forgot password</h1>
      <p class="auth-subtext">Enter your email and we'll send you a reset link.</p>

      @if (successMessage()) {
        <div class="auth-success">{{ successMessage() }}</div>
      }
      @if (errorMessage()) {
        <div class="auth-error">{{ errorMessage() }}</div>
      }

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="field">
          <label for="email">Email Address</label>
          <input id="email" type="email" formControlName="email" placeholder="you@example.com">
          @if (form.get('email')?.invalid && form.get('email')?.touched) {
            <span class="field-error">Please enter a valid email address</span>
          }
        </div>

        <button type="submit" class="btn-primary" [disabled]="isLoading()">
          {{ isLoading() ? 'Sending...' : 'Send Reset Link' }}
        </button>

        <p class="auth-switch"><a routerLink="/login">Back to login</a></p>
      </form>
    </div>
  </div>
  <div class="auth-right"></div>
</div>
