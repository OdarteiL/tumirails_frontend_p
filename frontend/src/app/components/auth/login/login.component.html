<div class="min-h-screen flex items-center justify-center bg-gray-50">
    <div class="card login-card">
        <div class="text-center mb-4">
            <h2 class="login-title">
                Sign in to Tumi Configurator
            </h2>
        </div>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input id="email" type="email" formControlName="email" class="form-input"
                    [class.border-red-600]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" />
                <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="error">
                    Email is required and must be valid
                </div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input id="password" type="password" formControlName="password" class="form-input"
                    [class.border-red-600]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" />
                <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error">
                    Password is required
                </div>
            </div>

            <div *ngIf="errorMessage()" class="error text-center mb-4">
                {{ errorMessage() }}
            </div>

            <button type="submit" [disabled]="loginForm.invalid || isLoading()" class="btn btn-primary login-btn">
                {{ isLoading() ? 'Signing in...' : 'Sign in' }}
            </button>

            <div class="text-center mt-4">
                <p class="signup-prompt">
                    Don't have an account?
                    <a routerLink="/register" class="signup-link">
                        Sign up
                    </a>
                </p>
            </div>
        </form>
    </div>
</div>
