<div class="min-h-screen flex flex-col bg-gray-50">
    <app-navbar></app-navbar>
    <div class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full bg-white rounded-3xl p-8 lg:p-12 shadow-xl border border-slate-100">
            <div class="text-center mb-10">
                <h2 class="text-3xl font-bold text-slate-900 mb-2">
                    Sign in to Tumi Configurator
                </h2>
                <p class="text-slate-600">
                    Welcome back! Please enter your details.
                </p>
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-2">Email</label>
                    <input id="email" type="email" formControlName="email" placeholder="your.email@example.com"
                        class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-[#0E6C8B] focus:border-transparent outline-none transition-all"
                        [class.border-red-500]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" />
                    <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
                        class="mt-1 text-sm text-red-500">
                        Email is required and must be valid
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-2">Password</label>
                    <input id="password" type="password" formControlName="password" placeholder="••••••••"
                        class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-[#0E6C8B] focus:border-transparent outline-none transition-all"
                        [class.border-red-500]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" />
                    <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
                        class="mt-1 text-sm text-red-500">
                        Password is required
                    </div>
                </div>

                <div *ngIf="errorMessage()" class="text-center p-3 rounded-lg bg-red-50 text-red-600 text-sm">
                    {{ errorMessage() }}
                </div>

                <button type="submit" [disabled]="loginForm.invalid || isLoading()"
                    class="w-full bg-primary hover:bg-primary disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-bold py-3 px-6 rounded-lg text-lg transition-all duration-300 shadow-md">
                    {{ isLoading() ? 'Signing in...' : 'Sign in' }}
                </button>

                <div class="text-center mt-6">
                    <p class="text-slate-600">
                        Don't have an account?
                        <a routerLink="/register"
                            class="text-primary hover:text-primary font-medium hover:underline transition-colors">
                            Sign up
                        </a>
                    </p>
                </div>
            </form>
        </div>
    </div>
    <app-footer></app-footer>
</div>
