<div class="auth-page">

  <!-- Left: Form -->
  <div class="auth-left">
    <div class="auth-inner">
      <a routerLink="/" class="auth-logo">
        <img src="assets/tumi_new.png" alt="Tumirails">
      </a>

      <h1 class="auth-heading">welcome back</h1>
      <p class="auth-subtext">Please login to your account to continue.</p>

      @if (errorMessage()) {
        <div class="auth-error">{{ errorMessage() }}</div>
      }

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="field">
          <label>Email Address</label>
          <input type="email" formControlName="email" placeholder="you@example.com">
          @if (getFieldError('email')) {
            <span class="field-error">{{ getFieldError('email') }}</span>
          }
        </div>

        <div class="field">
          <label>Password</label>
          <input type="password" formControlName="password" placeholder="••••••••">
          @if (getFieldError('password')) {
            <span class="field-error">{{ getFieldError('password') }}</span>
          }
        </div>

        <div class="auth-options">
          <label class="remember-me">
            <input type="checkbox"> Remember me
          </label>
          <a routerLink="/forgot-password" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary" [disabled]="isLoading()">
          {{ isLoading() ? 'Logging in...' : 'Login' }}
        </button>

        <p class="auth-switch">Don't have an account? <a routerLink="/register">Sign up</a></p>
      </form>
    </div>
  </div>

  <!-- Right: Image -->
  <div class="auth-right"></div>

</div>
