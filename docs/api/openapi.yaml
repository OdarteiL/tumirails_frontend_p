  # ---------------- ORGANISATIONS ----------------
  /organisations:
    get:
      summary: List all organisations for authenticated user
      description: Returns all organisations where the user is a member
      tags: [Organisations]
      responses:
        "200":
          description: List of organisations
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Organisations retrieved successfully"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Organisation"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      summary: Create a new organisation
      description: |
        Create an organisation with optional site transfer.
        
        **Organisation Types:**
        - installer: Requires license_number, service_areas, years_experience
        - provider: Requires business_registration, service_areas
        - customer: Only requires name and description
        
        **Site Transfer:**
        Set transfer_sites to true to migrate user's existing sites to the new organisation.
      tags: [Organisations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type]
              properties:
                name:
                  type: string
                  example: "Solar Installations Co."
                type:
                  type: string
                  enum: [installer, provider, customer]
                  example: "installer"
                description:
                  type: string
                  nullable: true
                  example: "Professional solar installation company"
                transfer_sites:
                  type: boolean
                  nullable: true
                  example: true
                  description: "Transfer user's existing sites to organisation"
                license_number:
                  type: string
                  example: "ORG-LIC-GH-2024-001"
                  description: "Required for installer type"
                business_registration:
                  type: string
                  example: "ORG-BRN-GH-2024-001"
                  description: "Required for provider type"
                service_areas:
                  type: array
                  items:
                    type: string
                  example: ["Greater Accra", "Ashanti"]
                  description: "Required for installer and provider types"
                certifications:
                  type: array
                  items:
                    type: string
                  nullable: true
                  example: ["ISO 9001:2015"]
                years_experience:
                  type: integer
                  example: 10
                  description: "Required for installer type"
      responses:
        "201":
          description: Organisation created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Organisation created successfully"
                  data:
                    $ref: "#/components/schemas/Organisation"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /organisations/{id}:
    get:
      summary: Get organisation details
      description: Get detailed information about a specific organisation
      tags: [Organisations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Organisation details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Organisation retrieved successfully"
                  data:
                    $ref: "#/components/schemas/Organisation"
        "403":
          description: Forbidden - Not a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Organisation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      summary: Update organisation
      description: Update organisation details (requires admin or owner permission)
      tags: [Organisations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Organisation updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Organisation updated successfully"
                  data:
                    $ref: "#/components/schemas/Organisation"
        "403":
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      summary: Delete organisation
      description: Delete organisation (requires owner permission)
      tags: [Organisations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Organisation deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Organisation deleted successfully"
        "403":
          description: Forbidden - Not the owner
          content:
            application/json:
              schema:
