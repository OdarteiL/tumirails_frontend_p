      summary: Add appliance to site
      description: Add an appliance with quantity and daily usage hours to a specific site
      tags:
        - Sites
      security:
        - bearerAuth: []
      parameters:
        - name: site_id
          in: path
          required: true
          schema:
            type: integer
          description: Site ID
          example: 101
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - appliance_id
                - quantity
                - daily_usage_hours
              properties:
                appliance_id:
                  type: integer
                  description: ID of the appliance to add
                  example: 7
                quantity:
                  type: integer
                  minimum: 1
                  description: Number of appliances
                  example: 2
                daily_usage_hours:
                  type: number
                  format: double
                  minimum: 0
                  maximum: 24
                  description: Daily usage hours (0-24)
                  example: 8.5
                notes:
                  type: string
                  nullable: true
                  maxLength: 1000
                  description: Optional notes about the appliance usage
                  example: Living room and bedroom fans
      responses:
        '201':
          description: Appliance added to site successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Appliance added to site successfully
                  data:
                    $ref: '#/components/schemas/SiteAppliance'
              example:
                success: true
                message: Appliance added to site successfully
                data:
                  id: 1
                  user_id: 1
                  site_id: 101
                  appliance_id: 7
                  quantity: 2
                  daily_usage_hours: 8.5
                  notes: Living room and bedroom fans
                  created_at: '2025-12-10T10:00:00Z'
                  updated_at: '2025-12-10T10:00:00Z'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: Unauthenticated
              example:
                success: false
                error: Unauthenticated
        '403':
          description: Forbidden - User doesn't own the site
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: You do not have access to this site
              example:
                success: false
                error: You do not have access to this site
        '404':
          description: Site not found or access denied
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: Site not found or access denied
              example:
                success: false
                error: Site not found or access denied
        '409':
          description: Appliance already added to site
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: Appliance already added to this site
              example:
                success: false
                error: Appliance already added to this site
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: Validation failed
                  errors:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: string
              example:
                success: false
                error: Validation failed
                errors:
                  appliance_id:
                    - Selected appliance does not exist
                  quantity:
                    - Quantity must be at least 1
                  daily_usage_hours:
                    - Daily usage hours cannot exceed 24

  # ---------------- ESTIMATIONS ----------------
  /estimations:
    post:
      summary: Create energy estimation for a site
      description: |
        Creates a new estimation for a site. The owner is automatically determined from the site. Calculates energy consumption based on site appliances, applies power factors, seasonal adjustments, and location multipliers. Uses active tariff structure for cost calculation.
      tags:
        - Estimations
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - site_id
              properties:
                site_id:
                  type: integer
                  description: ID of the site to create estimation for
            example:
              site_id: 101
      responses:
        '201':
          description: Estimation created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Estimation'
              example:
                success: true
                message: Estimation created successfully
                data:
                  id: 301
                  site:
                    id: 101
                    name: Accra Apartment
                  owner:
                    id: 1
                    type: User
                    name: Ama Mensah
                  version: 1
                  total_watts: '5000.00'
                  daily_kwh: '108.00'
                  monthly_kwh: '3726.00'
                  estimated_monthly_cost: '3890.45'
        '400':
          description: Bad request (site not found, no active tariff, etc.)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
              example:
                success: false
                error: 'No active tariff structure found for country: Ghana'
        '403':
          description: Unauthorized (user doesn't have permission to create estimation for
            this site)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
              example:
                success: false
                error: Site does not belong to the specified owner

    get:
      summary: List all estimations for authenticated user
      description: Returns all estimations owned by the authenticated user
      tags:
        - Estimations
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of user's estimations
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Estimation'
              example:
                success: true
                message: Estimations retrieved successfully
                data:
                  - id: 301
                    site:
                      id: 101
                      name: Accra Apartment
                    version: 2
                    estimated_monthly_cost: '3890.45'
                  - id: 302
                    site:
                      id: 102
                      name: Kumasi Office
                    version: 1
                    estimated_monthly_cost: '5200.00'

  /estimations/{estimation}:
    get:
      summary: Get a single estimation by ID
      description: Retrieves detailed estimation data with permission check
      tags:
        - Estimations
      security:
        - bearerAuth: []
      parameters:
        - name: estimation
          in: path
          required: true
          schema:
            type: integer
          description: Estimation ID
      responses:
        '200':
          description: Estimation retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Estimation'
              example:
                success: true
                message: Estimation retrieved successfully
                data:
                  id: 301
                  site:
                    id: 101
                    name: Accra Apartment
                  version: 2
                  estimated_monthly_cost: '3890.45'
        '403':
          description: Unauthorized access
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
              example:
                success: false
                error: Unauthorized access to estimation
        '404':
          description: Estimation not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
              example:
                success: false
                error: Estimation not found

    put:
      summary: Recalculate an estimation
      description: |
        Recalculates an existing estimation with current tariffs and adjustments. Creates a new version if appliances have changed since last calculation. Requires admin/owner permission for organisation-owned estimations.
      tags:
        - Estimations
      security:
        - bearerAuth: []
      parameters:
        - name: estimation
          in: path
          required: true
          schema:
            type: integer
          description: Estimation ID
      responses:
        '200':
          description: Estimation recalculated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Estimation'
              example:
                success: true
                message: Estimation recalculated successfully
                data:
                  id: 302
                  version: 3
                  previous_estimation_id: 301
                  estimated_monthly_cost: '4100.00'
        '403':
          description: Unauthorized (insufficient permissions)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
              example:
                success: false
                error: User does not have permission to modify this estimation

    delete:
      summary: Soft delete an estimation
      description: |
        Soft deletes an estimation (can be restored later). Requires admin/owner permission for organisation-owned estimations.
      tags:
        - Estimations
      security:
        - bearerAuth: []
      parameters:
        - name: estimation
          in: path
          required: true
          schema:
            type: integer
          description: Estimation ID
      responses:
        '200':
          description: Estimation deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
              example:
                success: true
                message: Estimation deleted successfully
        '403':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
              example:
                success: false
                error: User does not have permission to modify this estimation

  /organisations/{organisation}/estimations:
    get:
      summary: List all estimations for an organisation
      description: |
        Returns all estimations owned by an organisation. Any member of the organisation can view estimations.
      tags:
        - Estimations
        - Organisations
      security:
        - bearerAuth: []
      parameters:
        - name: organisation
          in: path
          required: true
          schema:
            type: integer
          description: Organisation ID
      responses:
        '200':
          description: Organisation estimations retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Estimation'
              example:
                success: true
                message: Organisation estimations retrieved successfully
                data:
                  - id: 401
                    site:
                      id: 201
                      name: Office Building Accra
                    owner:
                      id: 10
                      type: Organisation
                      name: Solar Tech Ghana Ltd
                    version: 1
                    estimated_monthly_cost: '12500.00'
        '403':
          description: User not a member of organisation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
              example:
                success: false
                error: You do not have access to this organisation

  /estimations/{id}/recommendations:
    get:
      summary: Get recommended hardware based on estimation
      tags:
        - Estimations
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Recommended hardware list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationResponse'
    post:
      summary: Persist a user-selected recommendation bundle for an estimation
      tags:
        - Estimations
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecommendationBundleRequest'
      responses:
        '201':
          description: Recommendation bundle persisted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationBundleResponse'
        '403':
          description: Unauthorized to persist bundle for this estimation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
              example:
                success: false
                error: Unauthorized

  /estimations/{id}/recommendation-bundles:
    get:
      summary: Get persisted recommendation bundles for an estimation
      tags:
        - Estimations
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of persisted recommendation bundles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationBundleListResponse'
        '403':
          description: User not authorized to access bundles for this estimation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
              example:
                success: false
                error: Unauthorized

  # ---------------- PAYMENTS ----------------
  /projects/{id}/payments:
    post:
      summary: Make a payment for a project milestone
      tags:
        - Payments
      parameters:
        - name: id
          in: path
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
                - payment_method
              properties:
                amount: number
                payment_method: string
                milestone_id: integer
      responses:
        '201':
          description: Payment recorded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '400':
          description: Payment error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

tags:
  - name: Auth
