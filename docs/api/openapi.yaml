  - name: Authentication
    description: User authentication operations
  - name: Organisations
    description: Organization management endpoints
  - name: Sites
    description: Site management endpoints
  - name: Appliances
    description: Appliance catalog and custom appliance management for users
  - name: Admin - Appliances
    description: Administrative endpoints for managing appliances (catalog items)
  - name: Estimations
    description: Energy estimation and calculation endpoints
  - name: Payments
    description: Payment processing endpoints