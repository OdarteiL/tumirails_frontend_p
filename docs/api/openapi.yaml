openapi: 3.1.0
info:
  title: Tumi Configurator API
  version: 1.0.0
  description: >
    Backend API for Tumi Configurator built with Laravel.
    It supports energy estimation, hardware recommendation,
    installer assignment, milestone-based payments, and verification.

servers:
  - url: https://api.tumi-energy.com/v1
    description: Production API
  - url: https://staging-api.tumi-energy.com/v1
    description: Staging API

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ---------------------- USER ----------------------
    User:
      type: object
      properties:
        id: integer
        first_name: string
        last_name: string
        email: string
        phone: string
        role:
          type: string
          enum: [customer, installer, provider, admin, verifier]
        status:
          type: string
          enum: [active, inactive, suspended]
        profile_image_url: string
        created_at: string
        updated_at: string
      example:
        id: 1
        first_name: Ama
        last_name: Mensah
        email: ama@example.com
        phone: "+233500000000"
        role: customer
        status: active
        profile_image_url: https://s3.amazonaws.com/tumi/profile1.png
        created_at: 2025-01-10T08:00:00Z
        updated_at: 2025-01-10T08:00:00Z

    # ---------------------- SITE ----------------------
    Site:
      type: object
      properties:
        id: integer
        user_id: integer
        name: string
        address: string
        longitude: number
        latitude: number
        meter_type:
          type: string
          enum: [prepaid, postpaid, smart]
        notes: string
        images: 
          type: array
          items:
            $ref: "#/components/schemas/Image"
      example:
        id: 101
        user_id: 1
        name: "Accra Apartment"
        address: "Osu, Accra"
        longitude: -0.186964
        latitude: 5.603717
        meter_type: prepaid
        notes: "Single phase connection"
        images:
          - id: 501
            url: "https://s3.tumi-energy.com/sites/site1-1.jpg"

    # ---------------------- IMAGE ----------------------
    Image:
      type: object
      properties:
        id: integer
        url: string
        caption: string
      example:
        id: 501
        url: https://s3.tumi-energy.com/sites/site1-1.jpg
        caption: "Front view of building"

    # ---------------------- APPLIANCE ----------------------
    Appliance:
      type: object
      properties:
        id: integer
        name: string
        default_wattage: number
        category: string
      example:
        id: 7
        name: "Ceiling Fan"
        default_wattage: 75
        category: "Cooling"

    # ---------------------- ESTIMATION ----------------------
    Estimation:
      type: object
      properties:
        id: integer
        site_id: integer
        total_kw: number
        daily_kwh: number
        monthly_cost_est: number
        currency: string
        input_payload: object
        status:
          type: string
          enum: [draft, completed]
      example:
        id: 301
        site_id: 101
        total_kw: 2.3
        daily_kwh: 5.2
        monthly_cost_est: 270.5
        currency: "GHS"
        input_payload:
          appliances:
            - id: 7
              quantity: 3
            - id: 12
              quantity: 2
          meter_image: "https://s3.tumi-energy.com/meters/meter1.jpg"
        status: completed

    # ---------------------- RECOMMENDED HARDWARE ----------------------
    RecommendedHardware:
      type: object
      properties:
        id: integer
        estimation_id: integer
        hardware_id: integer
        quantity: integer
        total_cost: number
        currency: string
      example:
        id: 901
        estimation_id: 301
        hardware_id: 4001
        quantity: 2
        total_cost: 1800.00
        currency: "GHS"

    # ---------------------- PAYMENT ----------------------
    Payment:
      type: object
      properties:
        id: integer
        project_id: integer
        amount: number
        payment_method:
          type: string
          enum: [momo, card, bank, transfer]
        status:
          type: string
          enum: [pending, success, failed, refunded]
        transaction_ref: string
      example:
        id: 701
        project_id: 601
        amount: 1200.00
        payment_method: momo
        status: success
        transaction_ref: "TXN-123456789"

    ErrorResponse:
      type: object
      properties:
        message: string
        errors: object
      example:
        message: "Validation failed"
        errors:
          email: ["Email already exists"]

paths:
  # ---------------- AUTH ----------------
  /auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name, email, password]
              properties:
                first_name: string
                last_name: string
                email: string
                password: string
                role: string
                phone: string
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      summary: Login user and receive JWT
      tags: [Auth]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: string
                password: string
      responses:
        "200":
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: string
                  user:
                    $ref: "#/components/schemas/User"
              example:
                access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                user:
                  id: 1
                  first_name: Ama
                  email: ama@example.com
        "401":
          description: Invalid credentials

  # ---------------- SITES ----------------
  /sites:
    get:
      summary: List all user sites
      tags: [Sites]
      responses:
        "200":
          description: Site list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Site"

    post:
      summary: Create a new site
      tags: [Sites]
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Site"
      responses:
        "201":
          description: Site created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Site"

  # ---------------- ESTIMATION ----------------
  /estimations:
    post:
      summary: Create energy estimation
      tags: [Estimations]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [site_id, input_payload]
              properties:
                site_id: integer
                input_payload: object
      responses:
        "201":
          description: Estimation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Estimation"

  /estimations/{id}/recommendations:
    get:
      summary: Get recommended hardware based on estimation
      tags: [Estimations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recommended hardware list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecommendedHardware"

  # ---------------- PAYMENTS ----------------
  /projects/{id}/payments:
    post:
      summary: Make a payment for a project milestone
      tags: [Payments]
      parameters:
        - name: id
          in: path
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [amount, payment_method]
              properties:
                amount: number
                payment_method: string
                milestone_id: integer
      responses:
        "201":
          description: Payment recorded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "400":
          description: Payment error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ---------------- APPLIANCES ----------------
  /appliances:
    get:
      summary: List all appliances
      tags: [Appliances]
      responses:
        "200":
          description: Appliance list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appliance"

  /appliances/{id}:
    get:
      summary: Get an appliance by ID
      tags: [Appliances]
      parameters:
        - name: id
          in: path
          schema:
            type: integer
      responses:
        "200":
          description: Appliance details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appliance"